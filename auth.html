<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login / Sign Up — FreeBooks</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="one">
    <a class="nav-logo" href="index.html" aria-label="Wimpy Books home">
      <img src="logo.svg" alt="Wimpy Books logo" width="40" height="40">
      <span>Wimpy Books</span>
    </a>
    <a href="index.html">🏠 Home</a>
    <a href="store.html">📚 Store</a>
    <a href="upload.html">⬆️ Upload</a>
    <a href="contacts.html">📞 Contacts</a>
    <a href="auth.html" class="active">🔐 Login</a>
  </nav>

  <section class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="tab active" data-tab="login">Login</button>
        <button class="tab" data-tab="signup">Sign Up</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="loginForm" class="auth-form active">
        <h2>Welcome Back 👋</h2>
        <p class="auth-sub">Login to upload, download, and read books.</p>

        <div class="input-group">
          <label>📧 Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="input-group">
          <label>🔒 Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-primary btn-full">Login</button>
        <div id="loginStatus" class="status-box" style="display:none;"></div>
      </form>

      <!-- SIGNUP FORM -->
      <form id="signupForm" class="auth-form">
        <h2>Create Account ✨</h2>
        <p class="auth-sub">Join FreeBooks — it's 100% free forever.</p>

        <div class="input-group">
          <label>👤 Full Name</label>
          <input type="text" id="signupName" placeholder="John Doe" required>
        </div>
        <div class="input-group">
          <label>📧 Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" required>
        </div>
        <div class="input-group">
          <label>🔒 Password (min 6 chars)</label>
          <input type="password" id="signupPassword" placeholder="••••••••" minlength="6" required>
        </div>
        <div class="input-group">
          <label>🔒 Confirm Password</label>
          <input type="password" id="signupConfirm" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-primary btn-full">Create Account</button>
        <div id="signupStatus" class="status-box" style="display:none;"></div>
      </form>
    </div>
  </section>

  <footer class="leg">
    <p>© 2026 FreeBooks. Built for readers, by readers. 📖</p>
  </footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script>
  if (Auth.getCurrentUser()) window.location.href = 'index.html';

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
    });
  });

  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const result = await Auth.login(email, password);
    const status = document.getElementById('loginStatus');
    status.style.display = 'block';
    status.className = 'status-box ' + (result.ok ? 'success' : 'error');
    status.textContent = result.msg;
    if (result.ok) setTimeout(() => window.location.href = 'index.html', 1000);
  });

  document.getElementById('signupForm').addEventListener('submit', async e => {
    e.preventDefault();
    const name = document.getElementById('signupName').value;
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;
    const confirm = document.getElementById('signupConfirm').value;
    const status = document.getElementById('signupStatus');

    if (password !== confirm) {
      status.style.display = 'block';
      status.className = 'status-box error';
      status.textContent = 'Passwords do not match.';
      return;
    }

    const result = await Auth.signup(name, email, password);
    status.style.display = 'block';
    status.className = 'status-box ' + (result.ok ? 'success' : 'error');
    status.textContent = result.msg;
    if (result.ok) setTimeout(() => window.location.href = 'index.html', 1000);
  });
</script>

</body>
</html>
